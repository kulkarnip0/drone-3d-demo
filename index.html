<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone 3D Mission World</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #101820;
    }

    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.48);
      padding: 12px 14px;
      border-radius: 10px;
      max-width: 390px;
      line-height: 1.4;
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(6px);
    }

    #info h1 {
      font-size: 18px;
      margin: 0 0 6px 0;
    }

    #info p {
      font-size: 13px;
      margin: 0;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="info">
    <h1>Coastal UAV Mission Sandbox</h1>
    <p>Modular world demo: procedural hills, coastline, sea, beach, forest zones, terrain-aware roads, improved buildings, mission zones, drone paths, and drone camera views. Press 1/2/3 for drone cameras and 0 for free view.</p>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
