<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone 3D Mission World</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #101820;
    }

    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.48);
      padding: 12px 14px;
      border-radius: 10px;
      max-width: 390px;
      line-height: 1.4;
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(6px);
    }

    #info h1 {
      font-size: 18px;
      margin: 0 0 6px 0;
    }

    #info p {
      font-size: 13px;
      margin: 0;
    }

    #asset-palette {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 12;
      width: 210px;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(6px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    #asset-palette .palette-title {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    #asset-palette button {
      width: 100%;
      margin: 4px 0;
      padding: 8px 10px;
      color: white;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
    }

    #asset-palette button:hover,
    #asset-palette button.active {
      background: rgba(0, 200, 255, 0.32);
      border-color: rgba(0, 220, 255, 0.8);
    }

    #asset-palette .palette-hint {
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.35;
      color: rgba(255, 255, 255, 0.76);
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="info">
    <h1>Coastal UAV Mission Sandbox</h1>
    <p>Modular world demo with terrain, sea, mission zones, drones, camera views, and a top-right asset palette. Select an asset and click terrain to place it. Press 1/2/3 for drone cameras and 0 for free view.</p>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
